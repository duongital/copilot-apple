services:
  nginx:
    image: nginx:alpine
    ports:
      - "4000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    expose:
      - "4002"
    environment:
      - PORT=4002
      - NODE_ENV=production
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    expose:
      - "4001"
    environment:
      - PORT=4001
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DB_PATH=/app/data/sessions.db
    volumes:
      - server-data:/app/data
    restart: unless-stopped

volumes:
  server-data:
